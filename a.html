<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Googleマップ風ナビ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
<style>
  html, body { margin:0; padding:0; height:100%; font-family:sans-serif; }
  #map { height:100%; }
  .search-box {
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    z-index:1000; display:flex; width:320px;
  }
  .search-box input {
    flex:1; padding:6px 10px; border-radius:3px 0 0 3px; border:none; outline:none; box-shadow:0 1px 4px rgba(0,0,0,0.3);
  }
  .search-box button {
    padding:6px 10px; border:none; border-radius:0 3px 3px 0; background:#4285F4; color:white; cursor:pointer;
  }
  #directions {
    position:absolute; bottom:80px; left:10px; right:10px; z-index:1000;
    background: rgba(0,0,0,0.6); color:white; padding:10px; border-radius:5px; max-height:200px; overflow-y:auto;
    font-size:14px;
  }
  .leaflet-routing-container { display:none; } /* デフォルトUI非表示 */
</style>
</head>
<body>

<div class="search-box">
  <input id="search-input" placeholder="目的地を入力" />
  <button id="search-btn">検索</button>
</div>
<div id="directions"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet-compass/dist/leaflet-compass.min.js"></script>

<script>
const map = L.map('map', { zoomControl:false }).setView([35.681236,139.767125], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

// ===== 現在地マーク =====
const currentMarker = L.marker([0,0]).addTo(map);
map.locate({ setView:true, watch:true, maxZoom:18 });

// ===== ルート管理 =====
let control = null;

// 案内テキスト更新
function updateDirections(routes){
  const container = document.getElementById('directions');
  container.innerHTML = '';
  if(!routes || routes.length===0) return;
  const steps = routes[0].instructions;
  steps.forEach(s=>{
    const p = document.createElement('p');
    p.textContent = `${s.text} (${Math.round(s.distance)}m)`;
    container.appendChild(p);
  });
}

// ルート検索
function routeTo(destLatLng){
  if(control) map.removeControl(control);
  control = L.Routing.control({
    waypoints:[currentMarker.getLatLng(), destLatLng],
    routeWhileDragging:true,
    router: L.Routing.osrmv1({ language:'ja' }),
    geocoder: L.Control.Geocoder.nominatim(),
    createMarker:()=>null
  }).addTo(map);

  control.on('routesfound', e => {
    const routes = e.routes[0].instructions ? [e.routes[0]] : e.routes;
    updateDirections(routes);
  });
}

// ===== 検索機能 =====
document.getElementById('search-btn').onclick = async () => {
  const query = document.getElementById('search-input').value;
  if(!query) return alert("目的地を入力してください");
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;
  const res = await fetch(url);
  const data = await res.json();
  if(data.length === 0) return alert("見つかりませんでした");
  const dest = L.latLng(data[0].lat, data[0].lon);
  routeTo(dest);
};

// ===== GPS追従 =====
map.on('locationfound', e => {
  currentMarker.setLatLng(e.latlng);
  if(control) control.spliceWaypoints(0,1,e.latlng); // ルート更新
});
</script>
</body>
</html>
