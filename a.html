<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Stable Nav</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:-apple-system;}
#map{height:100%}

/* 検索 */
#searchBar{
 position:absolute;top:10px;left:50%;
 transform:translateX(-50%);
 width:90%;max-width:500px;
 background:white;border-radius:20px;
 padding:10px;z-index:1000;
 display:flex;gap:5px;
 box-shadow:0 4px 10px rgba(0,0,0,.3);
}
input{flex:1;border:none;outline:none}
button{border:none;background:#007aff;color:white;padding:8px;border-radius:10px}

/* ナビヘッダー */
#navHeader{
 position:absolute;top:0;width:100%;
 background:#34c759;color:white;
 padding:10px;display:none;
 z-index:1100;
}
#navMain{font-size:18px;font-weight:bold}
#navSub{font-size:14px}

/* 現在地 */
.user{
 width:0;height:0;
 border-left:10px solid transparent;
 border-right:10px solid transparent;
 border-bottom:20px solid #007aff;
}

/* ボタン */
#locBtn{
 position:absolute;bottom:120px;right:20px;
 width:60px;height:60px;background:white;
 border-radius:50%;display:flex;
 align-items:center;justify-content:center;
 box-shadow:0 4px 10px rgba(0,0,0,.3);
 z-index:1000;
}
</style>
</head>

<body>

<div id="searchBar">
 <input id="q" placeholder="目的地">
 <button onclick="search()">検索</button>
</div>

<div id="navHeader">
 <div id="navMain">ナビ開始</div>
 <div id="navSub"></div>
</div>

<div id="map"></div>
<div id="locBtn">📍</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ===== 初期化 =====
const map=L.map('map',{zoomControl:true}).setView([35.68,139.76],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let current=null;
let marker=null;
let routeLine=null;
let routeCoords=[];
let steps=[];
let stepIndex=0;
let navigating=false;
let dest=null;

// ===== GPS（最重要） =====
navigator.geolocation.getCurrentPosition(pos=>{
 current=[pos.coords.latitude,pos.coords.longitude];

 marker=L.marker(current,{
  icon:L.divIcon({html:'<div class="user"></div>',iconSize:[20,20]})
 }).addTo(map);

 map.setView(current,17);

 startWatch();

},()=>{
 alert("GPS許可して");
});

function startWatch(){
 navigator.geolocation.watchPosition(pos=>{
  current=[pos.coords.latitude,pos.coords.longitude];

  if(navigating){
   current=snap(current);
   map.setView(current,18);
  }

  marker.setLatLng(current);

  if(navigating) checkRoute();

 },()=>{}, {enableHighAccuracy:true});
}

// ===== スナップ（15m） =====
function snap(p){
 if(!routeCoords.length) return p;

 let min=9999, best=p;

 for(let i=0;i<routeCoords.length;i++){
  const c=routeCoords[i];
  const d=dist(p[0],p[1],c[1],c[0]);
  if(d<min){
   min=d;
   best=[c[1],c[0]];
  }
 }

 return min<15 ? best : p;
}

// ===== 検索 =====
async function search(){
 if(!current) return alert("GPS待って");

 const q=document.getElementById("q").value;
 if(!q) return;

 const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`);
 const data=await res.json();

 if(!data.length) return alert("見つからない");

 dest=[parseFloat(data[0].lat),parseFloat(data[0].lon)];

 getRoute();
}

// ===== ルート取得 =====
async function getRoute(){
 const url=`https://router.project-osrm.org/route/v1/driving/${current[1]},${current[0]};${dest[1]},${dest[0]}?overview=full&steps=true&geometries=geojson`;

 const res=await fetch(url);
 const data=await res.json();

 if(!data.routes) return alert("ルート失敗");

 const r=data.routes[0];

 if(routeLine) map.removeLayer(routeLine);

 routeLine=L.geoJSON(r.geometry,{color:"#007aff",weight:5}).addTo(map);

 routeCoords=r.geometry.coordinates;
 steps=r.legs[0].steps;
 stepIndex=0;

 navigating=true;

 // UI切替
 document.getElementById("searchBar").style.display="none";
 document.getElementById("navHeader").style.display="block";

 updateNav();
}

// ===== ナビ表示 =====
function updateNav(){
 if(stepIndex>=steps.length){
  document.getElementById("navMain").innerText="到着";
  return;
 }

 const s=steps[stepIndex];

 let text="直進";
 if(s.maneuver.type==="turn"){
  if(s.maneuver.modifier==="left") text="左折";
  if(s.maneuver.modifier==="right") text="右折";
 }

 document.getElementById("navMain").innerText=text;
 document.getElementById("navSub").innerText=Math.round(s.distance)+"m先";
}

// ===== リルート =====
function checkRoute(){
 let min=9999;

 for(let c of routeCoords){
  const d=dist(current[0],current[1],c[1],c[0]);
  if(d<min) min=d;
 }

 if(min>40){
  getRoute(); // 再取得
 }
}

// ===== 進行 =====
setInterval(()=>{
 if(!navigating||!steps.length) return;

 const loc=steps[stepIndex].maneuver.location;
 const d=dist(current[0],current[1],loc[1],loc[0]);

 if(d<25){
  stepIndex++;
  updateNav();
 }
},1500);

// ===== 距離 =====
function dist(a,b,c,d){
 const R=6371000;
 const dLat=(c-a)*Math.PI/180;
 const dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== 現在地ボタン =====
document.getElementById("locBtn").onclick=()=>{
 if(current) map.setView(current,18);
};
</script>

</body>
</html>
