<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Nexis Nav</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
:root{
 --bg:#0b0f14;
 --card:#121821;
 --accent:#00d4ff;
 --text:#e6edf3;
 --sub:#8b98a5;
}

html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system;}
#map{height:100%;filter:brightness(.85) contrast(1.1);}

/* ===== Nexis Header ===== */
#navUI{
 position:absolute;top:0;width:100%;
 padding:14px;
 display:none;
 z-index:2000;
}
.card{
 background:var(--card);
 border-radius:16px;
 padding:14px;
 box-shadow:0 10px 30px rgba(0,0,0,.5);
 backdrop-filter:blur(10px);
}
#main{font-size:20px;font-weight:600}
#sub{font-size:13px;color:var(--sub)}

#end{
 position:absolute;right:20px;top:20px;
 background:var(--accent);
 border:none;border-radius:10px;
 padding:6px 10px;color:#000;
 font-weight:bold;
}

/* ===== Search ===== */
#search{
 position:absolute;top:20px;left:50%;
 transform:translateX(-50%);
 width:92%;max-width:500px;
 display:flex;gap:8px;
 z-index:1000;
}
#search input{
 flex:1;padding:12px;
 border-radius:14px;border:none;
 background:var(--card);color:var(--text);
}
#search button{
 padding:12px;border:none;border-radius:14px;
 background:var(--accent);color:#000;font-weight:bold;
}

/* ===== User Marker ===== */
.marker{
 width:0;height:0;
 border-left:10px solid transparent;
 border-right:10px solid transparent;
 border-bottom:20px solid var(--accent);
 transform-origin:50% 70%;
 position:relative;
}
.marker::after{
 content:"";
 position:absolute;
 left:-12px;top:-2px;
 border-left:12px solid transparent;
 border-right:12px solid transparent;
 border-bottom:24px solid #000;
 z-index:-1;
 filter:blur(2px);
}

/* ===== Button ===== */
#loc{
 position:absolute;bottom:120px;right:20px;
 width:60px;height:60px;
 background:var(--card);
 border-radius:50%;
 display:flex;align-items:center;justify-content:center;
 box-shadow:0 10px 20px rgba(0,0,0,.5);
 z-index:1000;
}
</style>
</head>

<body>

<div id="search">
 <input id="dest" placeholder="目的地 or 長押し">
 <button onclick="search()">GO</button>
</div>

<div id="navUI">
 <div class="card">
  <div id="main">--</div>
  <div id="sub">--</div>
 </div>
 <button id="end" onclick="stopNav()">終了</button>
</div>

<div id="map"></div>
<div id="loc">📍</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ===== STATE =====
const state={
 pos:null,
 heading:0,
 navigating:false,
 route:null,
 steps:[],
 stepIndex:0,
 zoom:17,
 dest:null
};

// ===== MAP =====
const map=L.map('map',{zoomControl:false}).setView([35.68,139.76],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

map.on("zoomend",()=>state.zoom=map.getZoom());

// ===== MARKER =====
const icon=L.divIcon({
 html:`<div id="arrow" class="marker"></div>`,
 iconSize:[30,30],iconAnchor:[15,15]
});
let marker=null;

// ===== GPS LOOP =====
navigator.geolocation.watchPosition(pos=>{
 state.pos=[pos.coords.latitude,pos.coords.longitude];

 if(!marker){
  marker=L.marker(state.pos,{icon}).addTo(map);
 }

 marker.setLatLng(state.pos);
},()=>{}, {enableHighAccuracy:true});

// ===== COMPASS =====
window.addEventListener("deviceorientationabsolute",e=>{
 if(e.alpha!=null){
  state.heading=e.alpha;
 }
});

// ===== MAIN LOOP =====
function loop(){
 if(state.pos){
  if(state.navigating){
   map.setView(state.pos,state.zoom,{animate:false});
   updateNav();
  }
  rotate();
 }
 requestAnimationFrame(loop);
}
loop();

// ===== ROTATE =====
function rotate(){
 const el=document.getElementById("arrow");
 if(el) el.style.transform=`rotate(${state.heading}deg)`;
}

// ===== SEARCH =====
async function search(){
 const q=document.getElementById("dest").value;
 if(!q)return;

 const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
 const d=await r.json();
 if(!d.length)return;

 startNav([parseFloat(d[0].lat),parseFloat(d[0].lon)]);
}

// ===== LONG PRESS =====
map.on("contextmenu",e=>{
 startNav([e.latlng.lat,e.latlng.lng]);
});

// ===== START NAV =====
async function startNav(dest){
 state.dest=dest;

 const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${state.pos[1]},${state.pos[0]};${dest[1]},${dest[0]}?overview=full&steps=true&geometries=geojson`);
 const json=await r.json();

 state.route=json.routes[0];
 state.steps=json.routes[0].legs[0].steps;
 state.stepIndex=0;
 state.navigating=true;

 draw();

 document.getElementById("search").style.display="none";
 document.getElementById("navUI").style.display="block";
}

// ===== DRAW =====
let line;
function draw(){
 if(line) map.removeLayer(line);
 line=L.geoJSON(state.route.geometry,{color:"#00d4ff",weight:6}).addTo(map);
}

// ===== NAV UPDATE =====
function updateNav(){
 if(!state.steps.length)return;

 let remain=0;
 for(let i=state.stepIndex;i<state.steps.length;i++){
  remain+=state.steps[i].distance;
 }

 const s=state.steps[state.stepIndex];

 document.getElementById("main").innerText=getText(s);
 document.getElementById("sub").innerText=
  fmt(s.distance)+"先 / 残り "+fmt(remain);

 advance();
}

// ===== STEP =====
function advance(){
 const loc=state.steps[state.stepIndex].maneuver.location;
 const d=dist(state.pos[0],state.pos[1],loc[1],loc[0]);

 if(d<20){
  state.stepIndex++;
 }
}

// ===== TEXT =====
function getText(s){
 const t=s.maneuver.type;
 const m=s.maneuver.modifier||"";

 if(t==="turn"){
  if(m==="right")return "右に曲がる";
  if(m==="left")return "左に曲がる";
 }
 if(t==="arrive")return "到着";
 return "直進";
}

// ===== STOP =====
function stopNav(){
 state.navigating=false;
 document.getElementById("navUI").style.display="none";
 document.getElementById("search").style.display="flex";
 if(line) map.removeLayer(line);
}

// ===== UTILS =====
function fmt(m){
 return m>1000?(m/1000).toFixed(1)+"km":Math.round(m)+"m";
}
function dist(a,b,c,d){
 const R=6371000;
 const dLat=(c-a)*Math.PI/180;
 const dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== LOC BTN =====
document.getElementById("loc").onclick=()=>{
 if(state.pos) map.setView(state.pos,state.zoom);
};
</script>

</body>
</html>
