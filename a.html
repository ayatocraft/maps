<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Google風ナビ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:-apple-system;}
#map{height:100%}

/* 検索 */
#searchBar{
 position:absolute;top:10px;left:50%;
 transform:translateX(-50%);
 width:90%;max-width:500px;
 background:white;border-radius:25px;
 padding:10px;z-index:1000;
 display:flex;gap:5px;
 box-shadow:0 4px 10px rgba(0,0,0,.3);
}
input{flex:1;border:none;outline:none}

/* ナビヘッダー */
#navHeader{
 position:absolute;
 top:0;
 width:100%;
 background:#34c759;
 color:white;
 padding:10px;
 z-index:1200;
 display:none;
}
#navHeader .main{
 font-size:18px;
 font-weight:bold;
}
#navHeader .sub{
 font-size:14px;
 opacity:0.9;
}

/* 現在地 */
.user-icon{
 width:30px;height:30px;position:relative;
}
.user-dot{
 width:12px;height:12px;background:#007aff;
 border-radius:50%;border:2px solid white;
 position:absolute;top:50%;left:50%;
 transform:translate(-50%,-50%);
}
.user-arrow{
 width:0;height:0;
 border-left:8px solid transparent;
 border-right:8px solid transparent;
 border-bottom:16px solid #007aff;
 position:absolute;top:-5px;left:50%;
 transform:translateX(-50%);
}

#locBtn{
 position:absolute;bottom:120px;right:20px;
 width:60px;height:60px;background:white;
 border-radius:50%;
 display:flex;align-items:center;justify-content:center;
 box-shadow:0 4px 10px rgba(0,0,0,.3);
 z-index:1000;
}
</style>
</head>

<body>

<div id="searchBar">
 <input id="q" placeholder="目的地">
 <button onclick="search()">検索</button>
</div>

<div id="navHeader">
 <div class="main" id="navMain">直進</div>
 <div class="sub" id="navSub">距離</div>
</div>

<div id="map"></div>
<div id="locBtn">📍</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map=L.map('map').setView([35.68,139.76],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let current=null, marker=null;
let routeLine=null, routeCoords=[];
let steps=[], stepIndex=0;
let navigating=false;
let destGlobal=null;

// ===== アイコン =====
const icon=L.divIcon({
 html:`<div class="user-icon">
 <div class="user-arrow"></div>
 <div class="user-dot"></div></div>`,
 iconSize:[30,30],iconAnchor:[15,15]
});

// ===== GPS =====
navigator.geolocation.watchPosition(pos=>{
 current=[pos.coords.latitude,pos.coords.longitude];

 if(!marker){
  marker=L.marker(current,{icon}).addTo(map);
 }

 // ===== スナップ補正 =====
 if(routeCoords.length){
  current=snapToRoute(current);
 }

 marker.setLatLng(current);

 if(navigating){
  map.setView(current,18);
  checkRouteDeviation();
 }

},{enableHighAccuracy:true});

// ===== スナップ（15m） =====
function snapToRoute(pos){
 let minDist=Infinity, nearest=pos;

 routeCoords.forEach(p=>{
  const d=dist(pos[0],pos[1],p[1],p[0]);
  if(d<minDist){
   minDist=d;
   nearest=[p[1],p[0]];
  }
 });

 return minDist<15 ? nearest : pos;
}

// ===== 検索 =====
async function search(){
 const q=document.getElementById("q").value;
 if(!q||!current)return;

 const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
 const data=await res.json();

 if(!data.length)return;

 destGlobal=[parseFloat(data[0].lat),parseFloat(data[0].lon)];

 startRoute(destGlobal);
}

// ===== ルート =====
async function startRoute(dest){
 const url=`https://router.project-osrm.org/route/v1/driving/${current[1]},${current[0]};${dest[1]},${dest[0]}?overview=full&steps=true&geometries=geojson`;

 const res=await fetch(url);
 const data=await res.json();

 const route=data.routes[0];

 if(routeLine) map.removeLayer(routeLine);

 routeLine=L.geoJSON(route.geometry,{color:"#007aff",weight:6}).addTo(map);

 routeCoords=route.geometry.coordinates;

 steps=route.legs[0].steps;
 stepIndex=0;

 navigating=true;

 // UI切替
 document.getElementById("searchBar").style.display="none";
 document.getElementById("navHeader").style.display="block";

 speak("ナビ開始");
 updateNav();
}

// ===== ナビ更新 =====
function updateNav(){
 if(stepIndex>=steps.length){
  speak("到着しました");
  return;
 }

 const step=steps[stepIndex];
 const text=getText(step);

 document.getElementById("navMain").innerText=text;
 document.getElementById("navSub").innerText=
  Math.round(step.distance)+"m 先";

 speak(text);
}

// ===== 指示 =====
function getText(s){
 const t=s.maneuver.type;
 const m=s.maneuver.modifier;

 if(t==="turn"){
  if(m==="left")return "左折";
  if(m==="right")return "右折";
 }
 if(t==="arrive")return "到着";
 return "直進";
}

// ===== リルート =====
function checkRouteDeviation(){
 if(!routeCoords.length)return;

 let min=Infinity;

 routeCoords.forEach(p=>{
  const d=dist(current[0],current[1],p[1],p[0]);
  if(d<min)min=d;
 });

 if(min>30){ // 30m外れたら再計算
  speak("ルートを再検索します");
  startRoute(destGlobal);
 }
}

// ===== 進行 =====
setInterval(()=>{
 if(!current||!steps.length)return;

 const loc=steps[stepIndex].maneuver.location;
 const d=dist(current[0],current[1],loc[1],loc[0]);

 if(d<25){
  stepIndex++;
  updateNav();
 }
},1500);

// ===== 距離 =====
function dist(a,b,c,d){
 const R=6371000;
 const dLat=(c-a)*Math.PI/180;
 const dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== 音声 =====
function speak(t){
 const u=new SpeechSynthesisUtterance(t);
 u.lang="ja-JP";
 speechSynthesis.cancel();
 speechSynthesis.speak(u);
}

// ===== 現在地 =====
document.getElementById("locBtn").onclick=()=>{
 if(current) map.setView(current,18);
};

// ===== iPhone対策 =====
document.body.addEventListener("click",()=>{
 speechSynthesis.resume();
},{once:true});
</script>

</body>
</html>
