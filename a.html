<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaflet Navigation App</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; }
        #map { width: 100%; height: 100%; z-index: 1; }

        .nav-marker-icon { transition: transform 0.25s linear; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3)); z-index: 1000 !important; }
        .nav-marker-icon svg { transition: transform 0.25s linear; will-change: transform; }

        #nav-panel {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            background-color: #0F9D58;
            color: white;
            z-index: 1000;
            padding: 10px;
            display: none;
            flex-direction: column;
        }

        #sidebar {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 350px;
            background: white;
            z-index: 1001;
            padding: 20px;
            overflow-y: auto;
        }

        button:disabled { opacity: 0.7; cursor: not-allowed; }

        #center-btn {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 900;
            background: white;
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center; justify-content: center;
        }
    </style>
</head>

<body>

<div id="sidebar">
    <h1>ナビゲーション</h1>

    <input id="start-input" placeholder="出発地">
    <input id="end-input" placeholder="目的地">

    <button id="btn-nav" onclick="calculateAndStart(false)">ナビ開始</button>
    <button id="btn-demo" onclick="calculateAndStart(true)">デモ</button>
</div>

<div id="nav-panel">
    <div id="nav-turn-icon">↑</div>
    <div id="nav-distance">0m</div>
    <div id="nav-instruction">---</div>
</div>

<div id="map"></div>
<div id="center-btn" onclick="toggleFollowMode()">◎</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>
// =========================
// 基本
// =========================
let map = L.map('map').setView([35.681,139.767],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let navMarker = L.marker([35.681,139.767]).addTo(map);

let routingControl = null;
let currentRoute = null;

let myLocation = {lat:35.681,lng:139.767};

let isNavigating = false;
let isDemoMode = false;
let isFollowing = true;

// =========================
// 音声（自然化）
// =========================
let voices = [];
let lastVoiceKey = "";
let audioUnlocked = false;

speechSynthesis.onvoiceschanged = () => {
    voices = speechSynthesis.getVoices();
};

function unlockAudio(){
    if(audioUnlocked) return;
    speechSynthesis.speak(new SpeechSynthesisUtterance(" "));
    audioUnlocked = true;
}

function getVoice(){
    return voices.find(v=>v.lang.includes("ja")) || null;
}

function speak(text, key=""){
    if(!text) return;
    if(key && lastVoiceKey === key) return;
    lastVoiceKey = key;

    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP";
    u.rate = 0.98;
    u.voice = getVoice();

    speechSynthesis.speak(u);
}

// =========================
// 位置更新
// =========================
navigator.geolocation.watchPosition(p=>{
    myLocation.lat = p.coords.latitude;
    myLocation.lng = p.coords.longitude;

    navMarker.setLatLng([myLocation.lat,myLocation.lng]);

    if(isNavigating) updateNav();
},{enableHighAccuracy:true});

// =========================
// ナビ開始
// =========================
async function calculateAndStart(demo){
    unlockAudio();

    const end = document.getElementById("end-input").value;
    if(!end) return alert("目的地なし");

    let endLatLng;

    if(end.includes(",")){
        let p=end.split(",");
        endLatLng=L.latLng(p[0],p[1]);
    }else{
        let res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(end)}`);
        let d=await res.json();
        if(!d.length) return alert("見つからない");
        endLatLng=L.latLng(d[0].lat,d[0].lon);
    }

    startRoute(endLatLng, demo);
}

// =========================
// ルート生成
// =========================
function startRoute(end,demo){

    if(routingControl) map.removeControl(routingControl);

    isDemoMode = demo;

    routingControl = L.Routing.control({
        waypoints:[
            L.latLng(myLocation.lat,myLocation.lng),
            end
        ],
        router:L.Routing.osrmv1({
            serviceUrl:"https://router.project-osrm.org/route/v1",
            profile:"driving",
            routingOptions:{
                steps:true,
                continue_straight:true,
                geometries:"geojson"
            }
        }),
        addWaypoints:false
    }).addTo(map);

    routingControl.on("routesfound",e=>{
        currentRoute=e.routes[0];
        isNavigating=true;

        map.fitBounds(L.latLngBounds(currentRoute.coordinates));

        document.getElementById("nav-panel").style.display="flex";

        speak("ナビを開始します","start");
    });
}

// =========================
// ナビ更新（修正版）
// =========================
function updateNav(){
    if(!currentRoute) return;

    let coords=currentRoute.coordinates;

    let idx=0,min=999999;

    for(let i=0;i<coords.length;i++){
        let d=map.distance([myLocation.lat,myLocation.lng],coords[i]);
        if(d<min){min=d;idx=i;}
    }

    let instr=currentRoute.instructions;

    let next=null;
    for(let i=0;i<instr.length;i++){
        if(instr[i].index>idx){
            next=instr[i];
            break;
        }
    }
    if(!next) return;

    let dist=0;
    for(let i=idx;i<next.index;i++){
        if(coords[i]&&coords[i+1])
            dist+=map.distance(coords[i],coords[i+1]);
    }

    document.getElementById("nav-distance").innerText =
        dist>1000?(dist/1000).toFixed(1)+"km":Math.round(dist)+"m";

    document.getElementById("nav-instruction").innerText =
        getText(next);

    document.getElementById("nav-turn-icon").innerHTML =
        "↑";

    if(dist<120 && dist>30){
        speak("まもなく "+getText(next),"near"+next.index);
    }
    if(dist<=30){
        speak(getText(next),"turn"+next.index);
    }
}

// =========================
// テキスト
// =========================
function getText(i){
    if(i.type==="arrive") return "目的地です";

    let m=i.modifier||"";

    if(m==="left") return "左に曲がります";
    if(m==="right") return "右に曲がります";
    if(m==="straight") return "直進します";
    if(m==="uturn") return "Uターンします";

    return "道なりです";
}

// =========================
// フォロー
// =========================
function toggleFollowMode(){
    isFollowing=true;
    map.setView([myLocation.lat,myLocation.lng]);
}

// =========================
// クリック目的地
// =========================
map.on("click",e=>{
    startRoute(e.latlng,false);
});
</script>

</body>
</html>
