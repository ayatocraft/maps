<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Nav Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:-apple-system;}
#map{height:100%}

/* ===== ヘッダー ===== */
#navHeader{
 position:absolute;top:0;width:100%;
 background:#34c759;color:white;
 padding:12px;
 z-index:2000;
 display:none;
}
#navMain{font-size:18px;font-weight:bold}
#navSub{font-size:13px}

#endBtn{
 position:absolute;right:10px;top:10px;
 background:white;color:#34c759;
 border:none;border-radius:10px;
 padding:6px 10px;
}

/* ===== 検索 ===== */
#searchBar{
 position:absolute;top:10px;left:50%;
 transform:translateX(-50%);
 width:95%;max-width:520px;
 background:white;border-radius:20px;
 padding:10px;z-index:1000;
 display:flex;
}
input{flex:1;border:none}

/* ===== 三角 ===== */
.userWrap{width:40px;height:40px;display:flex;justify-content:center;align-items:center;}
.user{
 border-left:12px solid transparent;
 border-right:12px solid transparent;
 border-bottom:24px solid red;
 position:relative;
 transform-origin:50% 70%;
}
.user::after{
 content:"";
 position:absolute;
 left:-14px;top:-2px;
 border-left:14px solid transparent;
 border-right:14px solid transparent;
 border-bottom:28px solid white;
 z-index:-1;
}

#locBtn{
 position:absolute;bottom:120px;right:20px;
 width:60px;height:60px;background:white;
 border-radius:50%;
 display:flex;align-items:center;justify-content:center;
 z-index:1000;
}
</style>
</head>

<body>

<div id="searchBar">
 <input id="dest" placeholder="目的地 or 長押しで設定">
 <button onclick="startNavByText()">GO</button>
</div>

<div id="navHeader">
 <button id="endBtn" onclick="endNav()">終了</button>
 <div id="navMain">--</div>
 <div id="navSub">--</div>
</div>

<div id="map"></div>
<div id="locBtn">📍</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map=L.map('map',{zoomControl:false}).setView([35.68,139.76],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let current=null, marker=null;
let heading=0;
let navigating=false;
let route=[],steps=[],stepIndex=0;
let destGlobal=null;
let userZoom=15;

// ===== ズーム保持 =====
map.on("zoomend",()=>{
 userZoom=map.getZoom();
});

// ===== マーカー =====
const icon=L.divIcon({
 html:`<div class="userWrap"><div id="arrow" class="user"></div></div>`,
 iconSize:[40,40],iconAnchor:[20,20]
});

// ===== GPS =====
navigator.geolocation.watchPosition(pos=>{
 current=[pos.coords.latitude,pos.coords.longitude];

 if(!marker){
  marker=L.marker(current,{icon}).addTo(map);
  map.setView(current,userZoom);
 }else{
  marker.setLatLng(current);
 }

 if(navigating){
  map.setView(current,userZoom,{animate:true}); // ←ズーム維持
  updateNav(); // ←リアルタイム更新
  checkRoute();
 }

 rotate();

},{enableHighAccuracy:true});

// ===== コンパス =====
window.addEventListener("deviceorientationabsolute",e=>{
 if(e.alpha!=null){
  heading=e.alpha;
  rotate();
 }
});
function rotate(){
 const el=document.getElementById("arrow");
 if(el) el.style.transform=`rotate(${heading}deg)`;
}

// ===== 距離 =====
function formatDist(m){
 return m>=1000?(m/1000).toFixed(1)+"km":Math.round(m)+"m";
}

// ===== ナビ更新（リアルタイム化） =====
function updateNav(){
 if(!steps.length)return;

 let remain=0;
 for(let i=stepIndex;i<steps.length;i++){
  remain+=steps[i].distance;
 }

 const next=steps[stepIndex];
 document.getElementById("navMain").innerText=
  getInstruction(next);

 document.getElementById("navSub").innerText=
  formatDist(next.distance)+"先 / 残り "+formatDist(remain);
}

// ===== 長押しで目的地 =====
map.on("contextmenu",e=>{
 startNav(e.latlng.lat,e.latlng.lng);
});

// ===== 検索 =====
async function startNavByText(){
 const q=document.getElementById("dest").value;
 if(!q)return;

 const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
 const d=await r.json();
 if(!d.length)return;

 startNav(parseFloat(d[0].lat),parseFloat(d[0].lon));
}

// ===== ナビ開始 =====
async function startNav(lat,lon){
 destGlobal=[lat,lon];

 const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${current[1]},${current[0]};${lon},${lat}?overview=full&steps=true&geometries=geojson`);
 const json=await r.json();

 route=json.routes[0].geometry.coordinates;
 steps=json.routes[0].legs[0].steps;
 stepIndex=0;
 navigating=true;

 draw(json.routes[0]);

 document.getElementById("searchBar").style.display="none";
 document.getElementById("navHeader").style.display="block";
}

// ===== 描画 =====
let line;
function draw(r){
 if(line) map.removeLayer(line);
 line=L.geoJSON(r.geometry,{color:"#007aff",weight:6}).addTo(map);
}

// ===== 終了 =====
function endNav(){
 navigating=false;
 document.getElementById("navHeader").style.display="none";
 document.getElementById("searchBar").style.display="flex";
 if(line) map.removeLayer(line);
}

// ===== 案内文 =====
function getInstruction(s){
 const t=s.maneuver.type;
 const m=s.maneuver.modifier||"";

 if(t==="turn"){
  if(m==="right")return "右に曲がる";
  if(m==="left")return "左に曲がる";
 }
 if(t==="arrive")return "到着";
 return "直進";
}

// ===== リルート =====
function checkRoute(){
 let min=999;
 route.forEach(c=>{
  const d=dist(current[0],current[1],c[1],c[0]);
  if(d<min)min=d;
 });
 if(min>40){
  startNav(destGlobal[0],destGlobal[1]);
 }
}

// ===== 距離 =====
function dist(a,b,c,d){
 const R=6371000;
 const dLat=(c-a)*Math.PI/180;
 const dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== 現在地ボタン =====
document.getElementById("locBtn").onclick=()=>{
 if(current) map.setView(current,userZoom);
};
</script>

</body>
</html>
