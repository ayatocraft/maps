<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Nav Map Stable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{margin:0;height:100%;font-family:-apple-system;}
#map{height:100%}

/* 検索 */
#searchBar{
 position:absolute;top:10px;left:50%;
 transform:translateX(-50%);
 width:90%;max-width:500px;
 background:white;border-radius:20px;
 padding:10px;z-index:1000;
 box-shadow:0 4px 10px rgba(0,0,0,.3);
 display:flex;gap:5px;
}
input{flex:1;border:none;outline:none;font-size:16px}
button{border:none;background:#007aff;color:white;border-radius:10px;padding:8px}

/* 下 */
#navPanel{
 position:absolute;bottom:0;width:100%;
 background:white;padding:10px;
 box-shadow:0 -2px 10px rgba(0,0,0,.2);
 z-index:1000;font-size:14px;
}

#locBtn{
 position:absolute;bottom:120px;right:20px;
 width:60px;height:60px;background:white;
 border-radius:50%;display:flex;
 align-items:center;justify-content:center;
 box-shadow:0 4px 10px rgba(0,0,0,.3);
 z-index:1000;font-size:22px;
}
</style>
</head>

<body>

<div id="searchBar">
  <input id="q" placeholder="目的地">
  <button onclick="search()">検索</button>
</div>

<div id="map"></div>
<div id="locBtn">📍</div>
<div id="navPanel">現在地取得中...</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([35.68,139.76], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let current = null;
let marker = null;
let routeLine = null;
let steps = [];
let stepIndex = 0;
let gpsReady = false;

// ===== GPS =====
navigator.geolocation.watchPosition(pos=>{
 current = [pos.coords.latitude, pos.coords.longitude];
 gpsReady = true;

 if(!marker){
  marker = L.marker(current).addTo(map);
 }
 marker.setLatLng(current);

}, err=>{
 document.getElementById("navPanel").innerText = "GPSエラー";
 console.log(err);
}, {enableHighAccuracy:true});

// ===== 検索 =====
async function search(){
 if(!gpsReady){
  alert("GPS取得中、少し待って");
  return;
 }

 const q = document.getElementById("q").value;
 if(!q) return;

 const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`);
 const data = await res.json();

 if(!data || data.length === 0){
  alert("見つからない");
  return;
 }

 const dest = [
  parseFloat(data[0].lat),
  parseFloat(data[0].lon)
 ];

 startRoute(dest);
}

// ===== ルート =====
async function startRoute(dest){
 const url = `https://router.project-osrm.org/route/v1/driving/${current[1]},${current[0]};${dest[1]},${dest[0]}?overview=full&steps=true&geometries=geojson`;

 const res = await fetch(url);
 const data = await res.json();

 if(!data.routes || data.routes.length === 0){
  alert("ルート取得失敗");
  return;
 }

 const route = data.routes[0];

 if(routeLine) map.removeLayer(routeLine);
 routeLine = L.geoJSON(route.geometry).addTo(map);

 map.fitBounds(routeLine.getBounds());

 steps = route.legs[0].steps;
 stepIndex = 0;

 speak("ナビを開始します");
 nextStep();
}

// ===== 指示生成 =====
function getInstruction(step){
 if(!step || !step.maneuver) return "進んでください";

 const type = step.maneuver.type;
 const mod = step.maneuver.modifier || "";

 if(type === "turn"){
  if(mod === "left") return "左に曲がります";
  if(mod === "right") return "右に曲がります";
 }
 if(type === "depart") return "出発します";
 if(type === "arrive") return "目的地に到着しました";

 return "そのまま進みます";
}

// ===== ナビ更新 =====
function nextStep(){
 if(stepIndex >= steps.length){
  document.getElementById("navPanel").innerText = "到着しました";
  speak("到着しました");
  return;
 }

 const text = getInstruction(steps[stepIndex]);
 document.getElementById("navPanel").innerText = text;

 speak(text);
}

// ===== 音声（iPhone対応） =====
function speak(text){
 const uttr = new SpeechSynthesisUtterance(text);
 uttr.lang = "ja-JP";
 speechSynthesis.cancel();
 speechSynthesis.speak(uttr);
}

// ===== 距離 =====
function dist(a,b,c,d){
 const R=6371000;
 const dLat=(c-a)*Math.PI/180;
 const dLon=(d-b)*Math.PI/180;
 const x=Math.sin(dLat/2)**2+
 Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ===== 進行判定 =====
setInterval(()=>{
 if(!current || steps.length===0) return;

 const step = steps[stepIndex];
 const loc = step.maneuver.location;

 const d = dist(current[0],current[1],loc[1],loc[0]);

 if(d < 30){
  stepIndex++;
  nextStep();
 }
},1500);

// ===== 現在地戻る =====
document.getElementById("locBtn").onclick=()=>{
 if(current) map.setView(current,18);
};

// ===== iPhone音声解禁 =====
document.body.addEventListener("click", ()=>{
 speechSynthesis.resume();
}, {once:true});
</script>

</body>
</html>
