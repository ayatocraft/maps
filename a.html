<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaflet Navigation App</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; }
        #map { width: 100%; height: 100%; z-index: 1; }

        .nav-marker-icon {
            transition: transform 0.25s linear;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
            z-index: 1000 !important;
        }
        .nav-marker-icon svg {
            transition: transform 0.25s linear;
            will-change: transform;
        }

        #nav-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #0F9D58;
            color: white;
            z-index: 1000;
            padding: 10px;
            display: none;
            flex-direction: column;
        }

        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 350px;
            background: white;
            z-index: 1001;
            padding: 20px;
            overflow-y: auto;
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        #center-btn {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 900;
            background: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

<div id="sidebar">
    <h1>ナビゲーション</h1>

    <input id="start-input" placeholder="出発地">
    <input id="end-input" placeholder="目的地">

    <button id="btn-nav" onclick="calculateAndStart(false)">ナビ開始</button>
    <button id="btn-demo" onclick="calculateAndStart(true)">デモ</button>
</div>

<div id="nav-panel">
    <div id="nav-turn-icon">↑</div>
    <div id="nav-distance">0m</div>
    <div id="nav-instruction">---</div>
</div>

<div id="map"></div>
<div id="center-btn" onclick="toggleFollowMode()">◎</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<script>
// =========================
// 元コードそのまま
// =========================
let map = L.map('map').setView([35.681,139.767],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let navMarker = L.marker([35.681,139.767]).addTo(map);

let routingControl = null;
let currentRoute = null;

let myLocation = {lat:35.681,lng:139.767};

let isNavigating = false;
let isDemoMode = false;
let isFollowing = true;

// =========================
// 🔧 最小バグ修正
// =========================
let lastVoiceKey = "";
let lastUpdate = 0;
let rerouteLock = false;

// ===== 音声（自然化・安定）=====
function speak(text, key=""){
    if(!text) return;
    if(key && lastVoiceKey === key) return;

    lastVoiceKey = key;

    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP";
    u.rate = 0.98;

    speechSynthesis.speak(u);
}

// ===== ナビ更新（ズレ修正のみ）=====
function updateNavDisplay(instrIdx){
    if(!currentRoute) return;

    const instrs = currentRoute.instructions;
    if(!instrs || instrIdx >= instrs.length) return;

    const instr = instrs[instrIdx];

    const coordIdx = getNearestRouteIndex(
        myLocation.lat,
        myLocation.lng,
        currentRoute.coordinates
    );

    const distToNext = calcDistanceToNextTurn(
        currentRoute,
        coordIdx,
        instrIdx
    );

    document.getElementById('nav-instruction').textContent =
        getTurnText(instr.modifier, instr.type, instr.text);

    document.getElementById('nav-turn-icon').innerHTML =
        `<i class="fas ${getTurnIcon(instr.modifier)}"></i>`;

    document.getElementById('nav-distance').textContent =
        formatDistance(distToNext);

    const total = currentRoute.summary?.totalDistance || 0;
    document.getElementById('nav-total-dist').textContent =
        "全長: " + (total / 1000).toFixed(1) + " km";
}

// ===== 位置更新（UIそのまま）=====
function updateMyLocation(lat, lng, heading){

    myLocation.lat = lat;
    myLocation.lng = lng;

    navMarker.setLatLng([lat,lng]);

    if(isFollowing){
        map.setView([lat,lng], map.getZoom(), {
            animate:true,
            duration:0.25
        });
    }

    const now = Date.now();
    if(now - lastUpdate < 150) return;
    lastUpdate = now;

    if(isNavigating && currentRoute && !isDemoMode){
        const idx = getNearestRouteIndex(lat,lng,currentRoute.coordinates);
        const instrIdx = getInstructionIndexFromCoord(currentRoute, idx);

        updateNavDisplay(instrIdx);

        const instr = currentRoute.instructions[instrIdx];
        if(instr && instr.distance < 120){
            const key = instrIdx + "_" + Math.floor(instr.distance / 10);
            if(lastVoiceKey !== key){
                speak(
                    `まもなく、${getTurnText(instr.modifier, instr.type, instr.text)}です`,
                    key
                );
            }
        }
    }
}

// ===== reroute暴走防止 =====
function triggerReroute(lat, lng){
    if(rerouteLock) return;
    rerouteLock = true;

    const endWp = routingControl.getWaypoints()[1];

    routingControl.setWaypoints([
        L.latLng(lat,lng),
        endWp.latLng
    ]);

    setTimeout(()=>rerouteLock=false, 4000);
}

// ===== スナップ修正 =====
function getClosestPointOnSegment(p, p1, p2){
    const dx = p2.lat - p1.lat;
    const dy = p2.lng - p1.lng;

    let t = ((p.lat - p1.lat)*dx + (p.lng - p1.lng)*dy) / (dx*dx + dy*dy || 1);

    t = Math.max(0, Math.min(1, t));

    return L.latLng(
        p1.lat + dx*t,
        p1.lng + dy*t
    );
}

// ===== 距離計算修正 =====
function calcDistanceToNextTurn(route, coordIdx, instrIdx){
    const coords = route.coordinates;
    const instrs = route.instructions;

    if(!coords || !instrs) return 0;
    if(instrIdx + 1 >= instrs.length) return 0;

    const target = instrs[instrIdx + 1].index;

    let dist = 0;

    for(let i=coordIdx;i<target;i++){
        if(coords[i] && coords[i+1]){
            dist += map.distance(coords[i], coords[i+1]);
        }
    }

    return dist;
}
</script>

</body>
</html>
